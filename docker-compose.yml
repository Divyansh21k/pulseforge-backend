version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme-replace-in-production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    volumes:
      - ./pulseforge.db:/app/pulseforge.db
    restart: unless-stopped
